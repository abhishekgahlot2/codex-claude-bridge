<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <defs>
    <style>
      .box { rx: 14; ry: 14; stroke-width: 1.5; }
      .label { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; fill: #e0e0e0; text-anchor: middle; }
      .sublabel { font-family: -apple-system, 'Segoe UI', sans-serif; fill: #888; text-anchor: middle; font-size: 12px; }
      .edge-label { font-family: 'SF Mono', monospace; fill: #999; text-anchor: middle; font-size: 11px; }
      .arrow { stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-both { stroke-width: 1.5; fill: none; marker-start: url(#arrowhead-rev); marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
    <marker id="arrowhead-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#0a0a0a" rx="0"/>

  <!-- Title -->
  <text x="450" y="36" class="label" font-size="16" font-weight="600" fill="#fff">Codex Bridge — Architecture</text>

  <!-- Claude Code box -->
  <rect x="120" y="60" width="200" height="72" class="box" fill="#1a1528" stroke="#7b61ff"/>
  <text x="220" y="94" class="label" font-size="15" font-weight="600" fill="#b490ff">Claude Code</text>
  <text x="220" y="116" class="sublabel" fill="#8a70cc">Anthropic</text>

  <!-- Codex CLI box -->
  <rect x="580" y="60" width="200" height="72" class="box" fill="#0d1f1a" stroke="#00d4aa"/>
  <text x="680" y="94" class="label" font-size="15" font-weight="600" fill="#00d4aa">Codex CLI</text>
  <text x="680" y="116" class="sublabel" fill="#2a9a7a">OpenAI</text>

  <!-- Arrows from top boxes down -->
  <line x1="220" y1="132" x2="220" y2="218" class="arrow-both" stroke="#7b61ff" opacity="0.5"/>
  <line x1="680" y1="132" x2="680" y2="218" class="arrow-both" stroke="#00d4aa" opacity="0.5"/>

  <!-- Edge labels on vertical arrows -->
  <rect x="160" y="163" width="120" height="22" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="220" y="178" class="edge-label" fill="#b490ff">stdio / channel</text>

  <rect x="620" y="163" width="120" height="22" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="680" y="178" class="edge-label" fill="#00d4aa">stdio / MCP</text>

  <!-- Bridge container -->
  <rect x="60" y="220" width="780" height="160" rx="16" fill="#111" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="450" y="248" class="label" font-size="13" fill="#555" font-weight="500">CODEX BRIDGE</text>

  <!-- server.ts box -->
  <rect x="100" y="262" width="240" height="90" class="box" fill="#161222" stroke="#2d2245"/>
  <text x="220" y="296" class="label" font-size="14" font-weight="600">server.ts</text>
  <text x="220" y="318" class="sublabel">Channel notifications</text>
  <text x="220" y="336" class="sublabel">reply / send_to_codex</text>

  <!-- codex-mcp.ts box -->
  <rect x="560" y="262" width="240" height="90" class="box" fill="#0a1a15" stroke="#1a3d30"/>
  <text x="680" y="296" class="label" font-size="14" font-weight="600">codex-mcp.ts</text>
  <text x="680" y="318" class="sublabel">send_to_claude()</text>
  <text x="680" y="336" class="sublabel">check_claude_messages()</text>

  <!-- HTTP API arrow between the two bridge components -->
  <line x1="340" y1="307" x2="560" y2="307" class="arrow-both" stroke="#555"/>
  <rect x="400" y="285" width="100" height="20" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="450" y="299" class="edge-label">HTTP API</text>

  <!-- Browser UI box -->
  <rect x="325" y="430" width="250" height="68" class="box" fill="#151515" stroke="#444"/>
  <text x="450" y="462" class="label" font-size="14" font-weight="600">Browser UI</text>
  <text x="450" y="482" class="sublabel">localhost:8788</text>

  <!-- WebSocket arrow from server.ts to Browser -->
  <line x1="260" y1="352" x2="390" y2="430" class="arrow-both" stroke="#555" opacity="0.6"/>
  <rect x="270" y="378" width="85" height="20" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="312" y="392" class="edge-label">WebSocket</text>

  <!-- Port label on Browser box -->
  <rect x="510" y="388" width="100" height="20" rx="4" fill="#111" stroke="#333" stroke-width="0.5"/>
  <text x="560" y="402" class="edge-label">:8788</text>
  <line x1="530" y1="352" x2="510" y2="430" class="arrow-both" stroke="#555" opacity="0.4" stroke-dasharray="4,4"/>

</svg>
